<div class="main-content">
  <div class="section-content section-content-p30">
    <div class="container-fluid">
      <div class="row">
        @for (product of products(); track product.sku) {
        <div class="col-md-3">
          <div class="product-box">
            <a [routerLink]="['/products', product.id]">
              <img src="{{ product.imageUrl }}" class="img-responsive">
            </a>
            <a [routerLink]="['/products', product.id]">
              <h1>{{ product.name }}</h1>
            </a>
            <div class="price">{{ product.unitPrice | currency:'USD' }}</div>
            <a href="#" class="primary-btn">Add to cart</a>
          </div>
        </div>
        }

        @if (products().length === 0) {
        <div class="alert alert-warning col-md-12" role="alert">
          No products found
        </div>
        }
      </div>
      <div class="footer-pagination">
        <div class="row">
          <div class="col-md-6"></div>
          <div class="col-md-6">
            <div class="row">
              <div class="col-md-9" style="padding-left: 30%">
                <ngb-pagination [(page)]="pageNumber" [pageSize]="pageSize" [collectionSize]="totalElements"
                  [maxSize]="5" [boundaryLinks]="true" (pageChange)="listProducts()" />
              </div>
              <div class="col-md-3 mt-2" style="text-align: right;">
                <span class="mr-2">Page Size</span>
                <select #pageSizeSelect (change)="updatePageSize(pageSizeSelect.value)">
                  <option selected="true">5</option>
                  <option>10</option>
                  <option>20</option>
                  <option>50</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
